<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Student Documents | Admin SMS</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><link href="/css/admin.css" rel="stylesheet"></head>
<body>
<nav class="admin-navbar"><div class="navbar-left"><button class="hamburger-btn" onclick="toggleAdminSidebar()"><i class="bi bi-list"></i></button><div class="brand"><div class="brand-icon"><i class="bi bi-mortarboard-fill"></i></div><span class="brand-text">University SMS</span><span class="badge-admin">ADMIN</span></div></div><div class="navbar-right"><div class="user-pill" onclick="toggleAdminUserDropdown()"><div class="avatar" th:text="${fullName?.substring(0,1)}">A</div><span th:text="${fullName}">Admin</span><div class="user-dropdown" id="adminUserDropdown"><a href="#" onclick="logout()" class="text-danger"><i class="bi bi-box-arrow-right"></i> Logout</a></div></div></div></nav>
<aside class="admin-sidebar" id="adminSidebar"><div class="sidebar-section-title">Main</div><a href="/admin/dashboard" class="admin-nav-item"><i class="bi bi-grid-1x2-fill"></i> <span class="nav-text">Dashboard</span></a></aside>
<main class="admin-main">
<div class="content-header"><h1><i class="bi bi-file-earmark-check me-2"></i>Pending Documents</h1><p>Review and approve student document submissions</p></div>
<div class="admin-card"><div class="admin-card-body"><table class="admin-table"><thead><tr><th>Student</th><th>Document Type</th><th>File</th><th>Uploaded</th><th>Actions</th></tr></thead><tbody>
<tr th:each="doc : ${documents}"><td th:text="${doc.student?.fullName}">Rahul</td><td th:text="${doc.docType}">ID Proof</td><td><i class="bi bi-file-earmark-pdf text-danger me-1"></i><span th:text="${doc.filePath}">doc.pdf</span></td><td style="font-size:0.82rem;color:var(--text-muted)" th:text="${doc.uploadedAt}">2026-01-15</td><td><button class="btn-sm-action btn-sm-success" title="Approve"><i class="bi bi-check-lg"></i></button><button class="btn-sm-action btn-sm-danger" title="Reject"><i class="bi bi-x-lg"></i></button><button class="btn-sm-action" title="Download"><i class="bi bi-download"></i></button></td></tr>
<tr th:if="${#lists.isEmpty(documents)}"><td colspan="5" class="text-center text-muted" style="padding:40px">No pending documents</td></tr>
</tbody></table></div></div>
</main><script src="/js/admin.js"></script></body></html>
