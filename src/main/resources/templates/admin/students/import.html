<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Bulk Import | Admin SMS</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><link href="/css/admin.css" rel="stylesheet"></head>
<body>
<nav class="admin-navbar"><div class="navbar-left"><button class="hamburger-btn" onclick="toggleAdminSidebar()"><i class="bi bi-list"></i></button><div class="brand"><div class="brand-icon"><i class="bi bi-mortarboard-fill"></i></div><span class="brand-text">University SMS</span><span class="badge-admin">ADMIN</span></div></div><div class="navbar-right"><div class="user-pill" onclick="toggleAdminUserDropdown()"><div class="avatar" th:text="${fullName?.substring(0,1)}">A</div><span th:text="${fullName}">Admin</span><div class="user-dropdown" id="adminUserDropdown"><a href="#" onclick="logout()" class="text-danger"><i class="bi bi-box-arrow-right"></i> Logout</a></div></div></div></nav>
<aside class="admin-sidebar" id="adminSidebar"><div class="sidebar-section-title">Main</div><a href="/admin/dashboard" class="admin-nav-item"><i class="bi bi-grid-1x2-fill"></i> <span class="nav-text">Dashboard</span></a></aside>
<main class="admin-main">
<div class="content-header"><h1><i class="bi bi-upload me-2"></i>Bulk Import Students</h1><p>Import students from a CSV or Excel file</p></div>
<div class="admin-card"><div class="admin-card-header"><h3>Upload File</h3></div><div class="admin-card-body" style="padding:40px;text-align:center"><i class="bi bi-cloud-upload" style="font-size:4rem;color:#94a3b8"></i><h4 class="mt-3" style="color:var(--text-secondary)">Drag & Drop or Click to Upload</h4><p class="text-muted">Supports .csv, .xlsx files (max 10MB)</p><input type="file" class="form-control mt-3" style="max-width:400px;margin:0 auto;border-radius:8px" accept=".csv,.xlsx"><button class="btn-admin mt-3" onclick="alert('Import started!')"><i class="bi bi-upload me-2"></i>Start Import</button></div></div>
</main><script src="/js/admin.js"></script></body></html>
