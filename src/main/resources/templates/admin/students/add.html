<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student | Admin SMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/css/admin.css" rel="stylesheet">
</head>
<body>
    <nav class="admin-navbar"><div class="navbar-left"><button class="hamburger-btn" onclick="toggleAdminSidebar()"><i class="bi bi-list"></i></button><div class="brand"><div class="brand-icon"><i class="bi bi-mortarboard-fill"></i></div><span class="brand-text">University SMS</span><span class="badge-admin">ADMIN</span></div></div><div class="navbar-right"><div class="user-pill" onclick="toggleAdminUserDropdown()"><div class="avatar" th:text="${fullName?.substring(0,1)}">A</div><span th:text="${fullName}">Admin</span><div class="user-dropdown" id="adminUserDropdown"><a href="#" onclick="logout()" class="text-danger"><i class="bi bi-box-arrow-right"></i> Logout</a></div></div></div></nav>
    <aside class="admin-sidebar" id="adminSidebar"><div class="sidebar-section-title">Main</div><a href="/admin/dashboard" class="admin-nav-item"><i class="bi bi-grid-1x2-fill"></i> <span class="nav-text">Dashboard</span></a><div class="sidebar-section-title">Student Mgmt</div><a href="#" class="admin-nav-item open" onclick="toggleAdminSubMenu(this);return false"><i class="bi bi-people-fill"></i> <span class="nav-text">Students</span><i class="bi bi-chevron-right nav-arrow"></i></a><div class="admin-sub-menu show"><a href="/admin/students">All Students</a><a href="/admin/students/new" class="active">Add Student</a><a href="/admin/students/import">Bulk Import</a></div></aside>

    <main class="admin-main">
        <div class="content-header"><h1><i class="bi bi-person-plus-fill me-2"></i>Add New Student</h1><p>Register a new student in the system</p></div>

        <div class="admin-card">
            <div class="admin-card-header"><h3>Student Information</h3></div>
            <div class="admin-card-body" style="padding:24px">
                <form id="addStudentForm">
                    <div class="row g-3">
                        <div class="col-md-6"><label class="form-label" style="font-weight:600;font-size:0.9rem">Full Name *</label><input type="text" class="form-control" required style="border-radius:8px" placeholder="Enter full name"></div>
                        <div class="col-md-6"><label class="form-label" style="font-weight:600;font-size:0.9rem">Student Code *</label><input type="text" class="form-control" required style="border-radius:8px" placeholder="e.g. STU2026001"></div>
                        <div class="col-md-6"><label class="form-label" style="font-weight:600;font-size:0.9rem">Email *</label><input type="email" class="form-control" required style="border-radius:8px" placeholder="student@university.edu"></div>
                        <div class="col-md-6"><label class="form-label" style="font-weight:600;font-size:0.9rem">Phone</label><input type="tel" class="form-control" style="border-radius:8px" placeholder="+91 XXXXXXXXXX"></div>
                        <div class="col-md-4"><label class="form-label" style="font-weight:600;font-size:0.9rem">Date of Birth</label><input type="date" class="form-control" style="border-radius:8px"></div>
                        <div class="col-md-4"><label class="form-label" style="font-weight:600;font-size:0.9rem">Gender</label><select class="form-select" style="border-radius:8px"><option value="">Select...</option><option>MALE</option><option>FEMALE</option><option>OTHER</option></select></div>
                        <div class="col-md-4"><label class="form-label" style="font-weight:600;font-size:0.9rem">Campus</label><input type="text" class="form-control" style="border-radius:8px" placeholder="Main Campus"></div>
                        <div class="col-md-4"><label class="form-label" style="font-weight:600;font-size:0.9rem">Program *</label><select class="form-select" required style="border-radius:8px"><option value="">Select Program...</option><option>B.Tech CSE</option><option>B.Tech ECE</option><option>BBA</option><option>MBA</option></select></div>
                        <div class="col-md-4"><label class="form-label" style="font-weight:600;font-size:0.9rem">Batch Year *</label><input type="number" class="form-control" required style="border-radius:8px" placeholder="2026"></div>
                        <div class="col-md-4"><label class="form-label" style="font-weight:600;font-size:0.9rem">Semester</label><select class="form-select" style="border-radius:8px"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option></select></div>
                        <div class="col-12"><label class="form-label" style="font-weight:600;font-size:0.9rem">Address</label><textarea class="form-control" rows="2" style="border-radius:8px" placeholder="Full address"></textarea></div>
                        <div class="col-md-6"><label class="form-label" style="font-weight:600;font-size:0.9rem">Default Password *</label><input type="password" class="form-control" required style="border-radius:8px" value="Student@123"></div>
                    </div>
                    <div class="mt-4 d-flex gap-2">
                        <button type="button" class="btn-admin" onclick="alert('Student added successfully!')"><i class="bi bi-check-circle me-2"></i>Create Student</button>
                        <a href="/admin/students" class="btn-admin" style="text-decoration:none;background:rgba(79,70,229,0.1);color:#4f46e5">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script src="/js/admin.js"></script>
</body>
</html>
